name: Ray CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        required: false
        default: 'main'
        type: string

env:
  PYTHON_VERSION: '3.11'
  DOCKER_BUILDKIT: 1
  RAY_CI_POST_WHEEL_TESTS: 1

jobs:
  build-base-images:
    name: Build Base Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Check Test Image Existence
      id: check_test_image
      run: |
        if docker manifest inspect ghcr.io/${{ github.repository }}/oss-ci-base_test-py${{ matrix.python }} > /dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Build Base Test Image
      if: steps.check_test_image.outputs.exists != 'true'
      uses: docker/build-push-action@v3
      with:
        context: .
        file: ci/docker/base.test.Dockerfile
        tags: |
          ghcr.io/${{ github.repository }}/oss-ci-base_test-py${{ matrix.python }}
        push: true

    - name: Check Build Image Existence
      id: check_build_image
      run: |
        if docker manifest inspect ghcr.io/${{ github.repository }}/oss-ci-base_build-py${{ matrix.python }} > /dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Build OSS CI Base
      if: steps.check_build_image.outputs.exists != 'true'
      uses: docker/build-push-action@v3
      with:
        context: .
        file: ci/docker/base.build.Dockerfile
        tags: ghcr.io/${{ github.repository }}/oss-ci-base_build-py${{ matrix.python }}
        build-args: |
          DOCKER_IMAGE_BASE_TEST=ghcr.io/${{ github.repository }}/oss-ci-base_test-py${{ matrix.python }}
        push: true

  core-tests:
    name: Core Tests
    needs: build-base-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Core Image
      run: |
        docker build -t ray-ci-core \
          --build-arg DOCKER_IMAGE_BASE_BUILD=ghcr.io/${{ github.repository }}/oss-ci-base_build-py${{ matrix.python }} \
          -f ci/docker/core.build.Dockerfile .

    - name: Run Core Python Tests
      run: |
        echo "Running core: python tests..."
        # First command set (excluding debug, asan, etc.)
        docker run ray-ci-core \
          pip install -r release/requirements_buildkite.txt && bazel run //ci/ray_ci:test_in_docker -- //python/ray/tests/... //python/ray/dag/... python/ray/autoscaler/v2/... core \
          --workers 4 --worker-id 0 --parallelism-per-worker 3 \
          --except-tags debug_tests,asan_tests,post_wheel_build,ha_integration,mem_pressure,tmpfs,container,manual,use_all_core,multi_gpu
        
        docker run ray-ci-core \
          pip install -r release/requirements_buildkite.txt && bazel run //ci/ray_ci:test_in_docker -- //python/ray/tests/... //python/ray/dag/... python/ray/autoscaler/v2/... core \
          --workers 4 --worker-id 0 \
          --only-tags use_all_core --skip-ray-installation

    - name: Run Dashboard Tests
      run: |
        echo "Running core: dashboard tests..."
        docker run ray-ci-core \
          pip install -r release/requirements_buildkite.txt && bazel run //ci/ray_ci:test_in_docker -- python/ray/dashboard/... core \
          --parallelism-per-worker 3
        
        # Run UI tests – note that this uses a docker run with a mounted volume
        docker run -i --rm --volume /tmp/artifacts:/artifact-mount --shm-size=2.5gb \
          "$${RAYCI_WORK_REPO}:$${RAYCI_BUILD_ID}-corebuild" /bin/bash -iecuo pipefail \
          "./python/ray/dashboard/tests/run_ui_tests.sh"

    - name: Run Wheel Tests
      run: |
        echo "Running core: wheel tests..."
        docker run ray-ci-core \
          pip install -r release/requirements_buildkite.txt && bazel run //ci/ray_ci:test_in_docker -- //python/ray/tests/... //doc/... core \
          --build-type wheel --parallelism-per-worker 3 \
          --only-tags post_wheel_build --test-env=RAY_CI_POST_WHEEL_TESTS=True

    # Generate a test report and upload the results to the GitHub Action output
    - name: Generate Test Report
      run: |
        echo "Generating test report..."
        # In a real setup, you would collate the logs/results from the tests.
        # Here we simulate with a summary file.
        echo "Test Report Summary:" > test-report.txt
        echo "All core tests have run successfully." >> test-report.txt
        cat test-report.txt

    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test-report.txt

    - name: Set GitHub Action Output with Test Report
      id: set-output
      run: echo "result=Test Report generated and uploaded as artifact 'test-report'" >> $GITHUB_OUTPUT
