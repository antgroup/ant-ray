  core-tests:
    name: Core Tests
    needs: build-base-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Core Image
      run: |
        docker build -t ray-ci-core \
          --build-arg DOCKER_IMAGE_BASE_BUILD=ghcr.io/${{ github.repository }}/oss-ci-base_build-py${{ matrix.python }} \
          -f ci/docker/core.build.Dockerfile .

    - name: Run Core Tests
      run: |
        docker run --rm -v $(pwd):/ray ray-ci-core \
          /bin/bash -c "DL=1 ./ci/env/install-dependencies.sh && bazel test --config=ci //python/ray/tests/... //python/ray/dag/... \
          --test_env=PYTHON_VERSION=${{ matrix.python }} \
          --build_tests_only \
          --test_output=streamed"
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: core-test-results-${{ matrix.python }}
        path: |
          test-results.xml
          /tmp/artifacts/**/*

